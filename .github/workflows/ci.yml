name: CI - Build

on:
  pull_request:
    branches:
      - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Mensaje inicial
              run: echo "Iniciando worjflow de CI"

            - name: checkout del código
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v3
              with:
                dotnet-version: '10.0.x'

            - name: Verificar Versión .NET
              run: dotnet --version